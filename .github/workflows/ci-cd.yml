name: CI/CD — Website Health Monitor

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  IMAGE_NAME: website-health-monitor

jobs:

  code-check:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m py_compile monitor.py  && echo OK monitor.py
          python -m py_compile app.py      && echo OK app.py
          python -m py_compile database.py && echo OK database.py
          python -m py_compile logger.py   && echo OK logger.py
          echo All Python files passed syntax check

      - name: Verify module imports
        run: |
          python -c "import monitor;  print('monitor.py  imported OK')"
          python -c "import logger;   print('logger.py   imported OK')"
          python -c "import database; print('database.py imported OK')"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: code-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: website-health-monitor:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/website-health-monitor:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/website-health-monitor:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image URL
        run: echo "Pushed to docker.io/${{ secrets.DOCKERHUB_USERNAME }}/website-health-monitor"
